# =========================================================
# Spring AI Ollama REST Backend - application.properties
# =========================================================

spring.application.name=springai-ollama-backend

# ---------------- Server ----------------
server.port=8080

# ---------------- Ollama ----------------
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5

# Keep chat options tuned for tool-calling scenarios
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.chat.options.num-ctx=2048
# Limit GPU layers to avoid CUDA OOM – set to 0 to force full CPU mode
spring.ai.ollama.chat.options.num-gpu=0

# ---------------- MySQL ----------------
spring.datasource.url=jdbc:mysql://localhost:3306/company_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# ---------------- Logging ----------------
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.mindx360=DEBUG
logging.level.org.springframework.ai=DEBUG

