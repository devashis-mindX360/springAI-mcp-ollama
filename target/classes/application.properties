# =========================================================
# Spring AI MCP Employee Server - MySQL (STDIO SAFE)
# =========================================================

spring.application.name=employee-mcp-server

# Disable web server + banner
spring.main.web-application-type=none
spring.main.banner-mode=off


# ---------------- MCP ----------------
spring.ai.mcp.server.name=employee-mcp-server-mysql
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.stdio=true

spring.ai.mcp.server.instructions=\
  This server exposes HR Employee data tools backed by a MySQL database.


# ---------------- MySQL ----------------
spring.datasource.url=jdbc:mysql://localhost:3306/company_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# VERY IMPORTANT
spring.jpa.show-sql=false


# ---------------- Logging ----------------

# Log to file only
logging.file.name=./logs/mcp-server-mysql.log

# Disable console completely
logging.level.root=OFF
logging.level.org.springframework=OFF
logging.level.org.hibernate=OFF
logging.level.org.springframework.ai.mcp=OFF

